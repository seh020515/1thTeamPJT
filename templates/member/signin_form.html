{% include 'include/header.html' %}

<div class="login-container">

    <div class="login-box">

        <h2>로그인</h2>

        <form action="{{ url_for('member.signin') }}" method="post">

            <div class="input-box">
                <label>아이디</label>
                <input
                    type="text"
                    name="member_id"
                    placeholder="아이디를 입력하세요"
                    required>
            </div>

            <div class="input-box">
                <label>비밀번호</label>
                <input
                    type="password"
                    name="member_pw"
                    placeholder="비밀번호를 입력하세요"
                    required>
            </div>

            <button type="submit" class="login-btn">
                로그인
            </button>

        </form>

        <div class="login-menu">

            <a href="{{ url_for('member.signup_form') }}">
                회원가입
            </a>

            <span>|</span>

            <a href="{{ url_for('index') }}">
                메인으로
            </a>

        </div>

    </div>

</div>

{% include 'include/footer.html' %}
