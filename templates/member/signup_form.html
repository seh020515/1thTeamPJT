{% include 'include/header.html' %}

<div class="signup-container">

    <div class="signup-box">

        <h2>회원가입</h2>

        <form action="{{ url_for('member.signup') }}" method="post">

            <div class="input-box">
                <label>이름</label>
                <input
                    type="text"
                    name="member_name"
                    placeholder="이름을 입력하세요"
                    required>
            </div>

            <div class="input-box">
                <label>아이디</label>
                <input
                    type="text"
                    name="member_id"
                    placeholder="아이디를 입력하세요"
                    required>
            </div>

            <div class="input-box">
                <label>비밀번호</label>
                <input
                    type="password"
                    name="member_pw"
                    placeholder="비밀번호를 입력하세요"
                    required>
            </div>

            <div class="input-box">
                <label>비밀번호 확인</label>
                <input
                    type="password"
                    name="member_pw_confirm"
                    placeholder="비밀번호를 다시 입력하세요"
                    required>
            </div>

            <div class="input-box">
                <label>이메일</label>
                <input
                    type="email"
                    name="member_email"
                    placeholder="이메일을 입력하세요"
                    required>
            </div>

            <button type="submit" class="signup-btn">
                회원가입
            </button>

        </form>

        <div class="signup-menu">

            <a href="{{ url_for('member.signin_form') }}">
                로그인
            </a>

            <span>|</span>

            <a href="{{ url_for('index') }}">
                메인으로
            </a>

        </div>

    </div>

</div>

{% include 'include/footer.html' %}
